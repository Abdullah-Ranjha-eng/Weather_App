<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Comic+Relief:wght@400;700&display=swap"
        rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        * {
            font-family: "Baloo 2", sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b1a2b;
            color: white;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        .logo {
            width: 100px;
            position: relative;
            left: -21px;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 19px;
            top: 19px;
            bottom: 13px;
            width: 80px;
            background: #111f33;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 20px 12px;
            border-radius: 10px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #aaa;
            margin: 15px 0;
            cursor: pointer;
            font-size: 16px;
        }

        .nav-btn.active {
            color: white;
        }

        /* Main */
        .main {
            flex: 1;
            padding: 20px;
            margin-left: 110px;
            /* space for sidebar */
        }

        /* Search */
        .search-box {
            position: relative;
            margin-bottom: 20px;
        }

        .search {
            width: 100%;
            padding: 10px 10px 10px 40px;
            border-radius: 10px;
            border: none;
            background: #1b2a40;
            color: white;
        }

        .search-icon {
            position: absolute;
            top: 50%;
            left: 10px;
            transform: translateY(-50%);
            width: 20px;
        }

        /* Pages */
        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* Weather */
        .weather-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #16263c;
            padding: 20px;
            border-radius: 15px;
        }

        .weather-icon {
            width: 100px;
            height: 100px;
            margin-right: 50px;
        }

        .extra-info p {
            font-size: 14px;
            margin-top: 5px;
            color: #ccc;
        }

        /* Forecast */
        .forecast {
            margin-top: 20px;
            background: #16263c;
            padding: 20px;
            border-radius: 15px;
        }

        .forecast-row {
            display: flex;
            justify-content: space-between;
        }

        /* Pages */
        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* City Cards */
        .city-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #16263c;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .city-card span {
            font-size: 30px;
        }

        .city-card.active {
            border: 2px solid #4da3ff;
        }

        .delete-btn {
            background: none;
            border: none;
            color: red;
            cursor: pointer;
            font-size: 22px;
            margin-right: 12px;
        }

        .delete-btn:hover {
            cursor: pointer;
            font-size: 23px;
        }

        .forecast-row {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            margin-top: 10px;
        }

        .forecast-item:last-child {
            border-right: none;
        }

        .forecast-item img {
            width: 50px;
            margin: 10px 0;
        }

        .forecast-container {
            margin-top: 20px;
            background: #16263c;
            padding: 20px;
            border-radius: 15px;
            height: 256px;
        }

        .forecast-title {
            margin-bottom: 15px;
            font-size: 28px;
            font-weight: 700;
        }

        .forecast {
            display: flex;
            gap: 8px;
            justify-content: space-evenly;
            overflow-x: auto;
        }

        .forecast-item {
            min-width: 100px;
            text-align: center;
            margin: -15px 0px 0px 0px;
        }

        /* Map */
        #map {
            width: 100%;
            height: 500px;
            border-radius: 15px;
        }

        .loca {
            position: relative;
            width: 25px;
        }

        .map-name {
            font-size: 34px;
            margin: -15px 0px 1px 0px;
        }

        /* setting css */
        /* Light Theme */
        body.light {
            background: #f5f7fb;
            color: #111;
        }

        body.light .sidebar {
            background: #42efd1;
            border: 1px solid black;
        }

        body.light .main {
            background: #f5f7fb;
        }

        body.light .forecast-container {
            margin-top: 20px;
            background: #705ff1;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid black;
            height: 252px;
        }

        body.light .weather-section,
        body.light .forecast,
        body.light .city-card {
            background: #42efd1;
            color: #111;
            border: 1px solid black;
        }

        body.light .search {
            background: #f7f7f7;
            color: #111;
            border: 1px solid black;
        }

        body.light .extra-info :only-child {
            color: black;
        }

        body.light .extra-info p {
            color: black;
        }

        body.light .nav-btn {
            color: black;
        }

        body.light .nav-btn.active {
            color: rgb(15 0 219);
        }

        body.light .search-icon {
            filter: invert();
        }

        /* 7 days forecast */
        .weather-layout {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .left-panel {
            flex: 2;
        }

        .right-panel {
            flex: 1;
            background: #16263c;
            padding: 20px;
            border-radius: 15px;
            height: 540px;
        }

        .day-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 21px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .day-item img {
            width: 35px;
        }

        body.light .right-panel {
            background: #42efd1;
            border: 1px solid black;
        }

        .line {
            border: 2px solid white;
        }
    </style>
</head>

<body>

    <div class="app">

        <!-- Sidebar -->
        <aside class="sidebar">
            <img class="logo" src="/images/logo.png">
            <button class="nav-btn active">Weather</button>
            <button class="nav-btn">Cities</button>
            <button class="nav-btn">Map</button>
            <button class="nav-btn">Settings</button>
        </aside>

        <!-- Main -->
        <main class="main">

            <!-- Search -->
            <div class="search-box">
                <img src="/images/search.svg" class="search-icon">
                <input type="text" class="search" placeholder="Search city...">
            </div>

            <!-- WEATHER PAGE -->
            <section class="page active">
                <div class="weather-layout">

                    <!-- LEFT SIDE (already exists) -->
                    <div class="left-panel">
                        <div class="weather-section">
                            <div>
                                <h1 id="cityName">Madrid</h1>
                                <p id="weatherDesc">Clear sky</p>
                                <h2 id="temperature">--</h2>

                                <div class="extra-info">
                                    <p>Feels like: <span id="feelsLike">--</span></p>
                                    <p>Humidity: <span id="humidity">--</span></p>
                                    <p>Wind: <span id="windSpeed">--</span></p>
                                    <p>Clouds: <span id="clouds">--</span></p>
                                </div>
                            </div>

                            <div id="weatherIcon" class="weather-icon"></div>
                        </div>

                        <section class="forecast-container">
                            <h2 class="forecast-title">Today's Forecast</h2>
                            <div class="forecast"></div>
                        </section>
                    </div>

                    <!-- RIGHT SIDE (NEW) -->
                    <div class="right-panel">
                        <h3>7-Day Forecast</h3>
                        <div id="dailyForecast"></div>

                    </div>
                </div>

            </section>

            <!-- CITIES PAGE -->
            <section id="citiesPage" class="page">
                <div id="citiesContainer"></div>
            </section>

            <!-- Maps page -->
            <section id="mapPage" class="page">
                <h2 class="forecast-title map-name"><img class="loca" src="/images/location.svg" alt="">Map</h2>
                <div id="map" style="height: 492px; border-radius: 15px; border: 1px solid black;"></div>
            </section>

            <!-- seting page -->
            <section id="settingsPage" class="page">
                <h2>Settings</h2>

                <div class="setting-item">
                    <label>Light Mode</label>
                    <input type="checkbox" id="themeToggle">
                </div>
            </section>

        </main>
    </div>

    <script>
        let cities = JSON.parse(localStorage.getItem("cities")) || [
            "Sialkot",
            "Lahore",
            "Karachi",
            "Islamabad"
        ];        // Navigation
        const buttons = document.querySelectorAll(".nav-btn");
        const pages = document.querySelectorAll(".page");

        buttons.forEach((btn, index) => {
            btn.addEventListener("click", () => {
                buttons.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");

                pages.forEach(p => p.classList.remove("active"));

                if (pages[index]) {
                    pages[index].classList.add("active");

                    // Fix map rendering
                    if (index === 2) { // Map page index
                        setTimeout(() => {
                            map.invalidateSize();
                        }, 200);
                    }
                }
            });
        });

        // API KEY
        const API_KEY = "Past_here";

        // Elements
        const cityName = document.getElementById("cityName");
        const temperature = document.getElementById("temperature");
        const weatherDesc = document.getElementById("weatherDesc");
        const icon = document.getElementById("weatherIcon");

        const feelsLike = document.getElementById("feelsLike");
        const humidity = document.getElementById("humidity");
        const windSpeed = document.getElementById("windSpeed");
        const clouds = document.getElementById("clouds");

        const searchInput = document.querySelector(".search");

        async function getWeather(city) {
            try {
                cityName.textContent = "Loading...";
                temperature.textContent = "--";

                const res = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}`
                );

                const data = await res.json();
                console.log(data);
                if (data.cod != 200) {
                    return;
                }
                // ✅ FIX: Update map here
                updateMap(data.coord.lat, data.coord.lon, data.name);

                cityName.textContent = data.name;
                temperature.textContent = Math.round(data.main.temp) + "°";
                weatherDesc.textContent = data.weather[0].description;

                feelsLike.textContent = Math.round(data.main.feels_like) + "°";
                humidity.textContent = data.main.humidity + "%";
                windSpeed.textContent = data.wind.speed + " m/s";
                clouds.textContent = data.clouds.all + "%";

                // 🌤 REAL ICON
                const iconCode = data.weather[0].icon;
                icon.innerHTML = getCustomIcon(iconCode);
                getForecast(city);
                get7DayForecast(city);
            } catch (err) {
                console.log(err);
                alert("Something went wrong!");
            }

        }
        // 7 days frecast
        async function get7DayForecast(city) {
            const container = document.getElementById("dailyForecast");
            container.innerHTML = "Loading...";

            try {
                const res = await fetch(
                    `https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${API_KEY}`
                );


                const data = await res.json();

                if (data.cod !== "200") {
                    container.innerHTML = "Error loading";
                    return;
                }

                container.innerHTML = "";

                const days = {};

                // Group data by day
                data.list.forEach(item => {
                    const date = item.dt_txt.split(" ")[0];

                    if (!days[date]) {
                        days[date] = [];
                    }

                    days[date].push(item);
                });

                // Get first 7 days
                const dayKeys = Object.keys(days).slice(0, 7);

                dayKeys.forEach((date, index) => {
                    const dayData = days[date];

                    let min = Infinity;
                    let max = -Infinity;
                    let icon = dayData[0].weather[0].icon;
                    let condition = dayData[0].weather[0].main;

                    dayData.forEach(d => {
                        min = Math.min(min, d.main.temp);
                        max = Math.max(max, d.main.temp);
                    });

                    const dayName = index === 0
                        ? "Today"
                        : new Date(date).toLocaleDateString("en-US", { weekday: "short" });

                    const div = document.createElement("div");
                    div.className = "day-item";

                    div.innerHTML = `
                      <p>${dayName}</p>
                      <img src="https://openweathermap.org/img/wn/${icon}.png">
                      <p>${condition}</p>
                      <p>${Math.round(max)}° / ${Math.round(min)}°</p>
                      
                    `;

                    container.appendChild(div);
                });


            } catch (err) {
                console.log(err);
                container.innerHTML = "Error";
            }
        }

        function getCustomIcon(code) {

            const icons = {
                "01d": `<svg width="120" height="120" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sun Core -->
  <circle cx="12" cy="12" r="5" fill="#FFD93B"/>

  <!-- Sun Rays -->
  <g stroke="#FFD93B" stroke-width="2" stroke-linecap="round">
    <line x1="12" y1="1" x2="12" y2="4"/>
    <line x1="12" y1="20" x2="12" y2="23"/>
    <line x1="1" y1="12" x2="4" y2="12"/>
    <line x1="20" y1="12" x2="23" y2="12"/>
    <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/>
    <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
    <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/>
    <line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
  </g>
</svg>`,

                "01n": `<svg width="120" height="120" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <!-- Moon (crescent) -->
  <path d="M16 12a6 6 0 1 1-6-6 5 5 0 0 0 6 6z" fill="#CFCFCF"/>

  <!-- Stars -->
  <g fill="#FFD93B">
    <circle cx="6" cy="5" r="1"/>
    <circle cx="18" cy="4" r="1"/>
    <circle cx="19" cy="10" r="1"/>
    <circle cx="5" cy="15" r="1"/>
  </g>

</svg>`,

                "02d": `<svg width="120" height="120" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Sun -->
  <circle cx="8" cy="8" r="4" fill="#FFD93B"/>
  <g stroke="#FFD93B" stroke-width="1.5" stroke-linecap="round">
    <line x1="8" y1="1" x2="8" y2="3"/>
    <line x1="8" y1="13" x2="8" y2="15"/>
    <line x1="1" y1="8" x2="3" y2="8"/>
    <line x1="13" y1="8" x2="15" y2="8"/>
    <line x1="3.5" y1="3.5" x2="5" y2="5"/>
    <line x1="11" y1="11" x2="12.5" y2="12.5"/>
    <line x1="3.5" y1="12.5" x2="5" y2="11"/>
    <line x1="11" y1="5" x2="12.5" y2="3.5"/>
  </g>

  <!-- Cloud -->
  <path d="M16 18H8a3 3 0 1 1 1-5.8A4 4 0 0 1 17 13a2.5 2.5 0 0 1-1 5z" fill="#E0E0E0"/>

</svg>`,

                "03d": `<svg width="120" height="120" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Back Cloud -->
  <path d="M15 10a3 3 0 0 0-5.5-1.5A3.5 3.5 0 0 0 6 14h8a2.5 2.5 0 0 0 1-4z" fill="#D6D6D6"/>

  <!-- Front Cloud -->
  <path d="M18 18H9a3 3 0 1 1 1-5.8A4 4 0 0 1 19 13a2.5 2.5 0 0 1-1 5z" fill="#EAEAEA"/>

</svg>`,

                "04d": `<svg width="120" height="120" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Back Cloud -->
  <path d="M14 9a3 3 0 0 0-5.5-1.5A3.5 3.5 0 0 0 5 13h7a2.5 2.5 0 0 0 2-4z" fill="#D0D0D0"/>

  <!-- Middle Cloud -->
  <path d="M18 14a3.5 3.5 0 0 0-6-2A4 4 0 0 0 9 17h7a2.5 2.5 0 0 0 2-3z" fill="#CFCFCF"/>

  <!-- Front Cloud -->
  <path d="M20 18H10a3 3 0 1 1 1-5.8A4 4 0 0 1 21 13a2.5 2.5 0 0 1-1 5z" fill="#EAEAEA"/>

</svg>`,

                "09d": `<svg width="120" height="120" viewBox="0 0 24 24" fill="none">
  <!-- Cloud -->
  <path d="M18 16H8a4 4 0 1 1 1.5-7.7A5 5 0 0 1 20 11a3 3 0 0 1-2 5z" fill="#BDBDBD"/>
  
  <!-- Rain drops -->
  <g stroke="#4FC3F7" stroke-width="2" stroke-linecap="round">
    <line x1="9" y1="18" x2="9" y2="21"/>
    <line x1="13" y1="18" x2="13" y2="21"/>
    <line x1="17" y1="18" x2="17" y2="21"/>
  </g>
</svg>`,

                "10d": `<svg width="120" height="120" viewBox="0 0 24 24" fill="none">

  <!-- Sun -->
  <circle cx="7" cy="7" r="3" fill="#FFD93B"/>

  <!-- Cloud -->
  <path d="M18 16H8a4 4 0 1 1 1.5-7.7A5 5 0 0 1 20 11a3 3 0 0 1-2 5z" fill="#D6D6D6"/>

  <!-- Rain -->
  <g stroke="#4FC3F7" stroke-width="2" stroke-linecap="round">
    <line x1="10" y1="18" x2="10" y2="21"/>
    <line x1="14" y1="18" x2="14" y2="21"/>
  </g>

</svg>`,

                "11d": `<svg width="120" height="120" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Cloud -->
  <path d="M18 15H8a4 4 0 1 1 1.5-7.7A5 5 0 0 1 20 10a3 3 0 0 1-2 5z" fill="#9E9E9E"/>

  <!-- Rain -->
  <g stroke="#4FC3F7" stroke-width="2" stroke-linecap="round">
    <line x1="10" y1="17" x2="10" y2="20"/>
    <line x1="14" y1="17" x2="14" y2="20"/>
  </g>

  <!-- Lightning -->
  <polygon points="12,16 15,16 13,21 16,21 11,26 13,19 10,19" fill="#FFD93B"/>

</svg>`,

                "13d": `<svg width="120" height="120" viewBox="0 0 24 24" fill="none">

  <!-- Cloud -->
  <path d="M18 15H8a4 4 0 1 1 1.5-7.7A5 5 0 0 1 20 10a3 3 0 0 1-2 5z" fill="#E0E0E0"/>

  <!-- Snowflakes -->
  <g stroke="#90CAF9" stroke-width="1.5">
    <line x1="10" y1="18" x2="10" y2="21"/>
    <line x1="14" y1="18" x2="14" y2="21"/>
    <line x1="12" y1="19" x2="12" y2="22"/>
  </g>

</svg>`,

                "50d": `<svg width="120" height="120" viewBox="0 0 24 24" fill="none">

  <!-- Fog lines -->
  <g stroke="#B0BEC5" stroke-width="2" stroke-linecap="round">
    <line x1="4" y1="8" x2="20" y2="8"/>
    <line x1="2" y1="12" x2="22" y2="12"/>
    <line x1="4" y1="16" x2="20" y2="16"/>
  </g>

</svg>`
            };

            return icons[code] || icons["01d"];
        }

        // Search
        // Add keydown listener instead
        searchInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const city = searchInput.value.trim();

                if (city === "") {
                    // If input is empty, show default cities
                    renderCities();
                } else {
                    // Search for the city
                    getWeather(city);
                    renderSearchedCity(city);
                    if (!cities.includes(city)) {
                        cities.push(city);
                        saveCities();
                    }
                }
            }

        });
        // Optional: listen for empty input while typing
        searchInput.addEventListener("input", () => {
            if (searchInput.value.trim() === "") {
                renderCities(); // Show default cities
            }
        });
        // Function to render a single searched city
        async function renderSearchedCity(city) {
            const container = document.getElementById("citiesContainer");
            container.innerHTML = "";

            try {
                const res = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}`
                );
                const data = await res.json();
                if (data.cod != 200) {
                    container.innerHTML = `<p style="color:#ccc;">City not found</p>`;
                    return;
                }

                const card = document.createElement("div");
                card.className = "city-card";

                const iconCode = data.weather[0].icon;
                const iconSVG = getCustomIcon(iconCode);

                card.innerHTML = `
    <span>${iconSVG}</span>
    <div>
        <h3>${data.name}</h3>
        <p>${new Date().toLocaleTimeString()}</p>
    </div>
    <h2>${Math.round(data.main.temp)}°</h2>
    <button class="delete-btn">❌</button>
`;

                // Click → show in weather page
                card.addEventListener("click", () => {
                    getWeather(city);

                    // Switch to Weather page
                    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
                    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));

                    document.querySelectorAll(".page")[0].classList.add("active");   // Weather page
                    document.querySelectorAll(".nav-btn")[0].classList.add("active"); // Weather button
                });

                container.appendChild(card);
            } catch (err) {
                console.log(err);
            }
        }

        // Update renderCities to show weather icons dynamically
        async function renderCities() {
            const container = document.getElementById("citiesContainer");
            container.innerHTML = "";

            for (let city of cities) {
                try {
                    const res = await fetch(
                        `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}`
                    );
                    const data = await res.json();
                    if (data.cod != 200) continue;

                    const card = document.createElement("div");
                    card.className = "city-card";

                    const iconCode = data.weather[0].icon;
                    const iconSVG = getCustomIcon(iconCode);

                    card.innerHTML = `
    <span>${iconSVG}</span>
    <div>
        <h3>${data.name}</h3>
        <p>${new Date().toLocaleTimeString()}</p>
    </div>
    <h2>${Math.round(data.main.temp)}°</h2>
    <button class="delete-btn">❌</button>
`;
                    card.querySelector(".delete-btn").addEventListener("click", (e) => {
                        e.stopPropagation(); // prevent click triggering weather

                        cities = cities.filter(c => c !== city);
                        saveCities();
                        renderCities();
                    });
                    // Click → show in weather page
                    card.addEventListener("click", () => {
                        getWeather(city);

                        document.querySelectorAll(".city-card").forEach(c => c.classList.remove("active"));
                        card.classList.add("active");

                        // Switch page
                        document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
                        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));

                        document.querySelectorAll(".page")[0].classList.add("active");
                        document.querySelectorAll(".nav-btn")[0].classList.add("active");
                    });

                    container.appendChild(card);
                } catch (err) {
                    console.log(err);
                }
            }
        }

        //Function to store cities
        function saveCities() {
            localStorage.setItem("cities", JSON.stringify(cities));
        }
        //
        async function getForecast(city) {
            const container = document.querySelector(".forecast");
            container.innerHTML = "Loading...";

            try {
                const res = await fetch(
                    `https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${API_KEY}`
                );


                const data = await res.json();

                if (data.cod != "200") {
                    container.innerHTML = "Error loading forecast";
                    return;
                }

                container.innerHTML = "";

                // Take first 8 items (~24 hours)
                const list = data.list.slice(0, 8);

                list.forEach(item => {
                    const time = new Date(item.dt_txt).getHours();
                    const temp = Math.round(item.main.temp);
                    const iconCode = item.weather[0].icon;

                    const div = document.createElement("div");
                    div.className = "forecast-item";

                    div.innerHTML = `
    <p>${formatTime(time)}</p>
    <img src="https://openweathermap.org/img/wn/${iconCode}.png">
    <h3>${temp}°</h3>
`;

                    container.appendChild(div);
                });


            } catch (err) {
                console.log(err);
                container.innerHTML = "Something went wrong";
            }
        }

        //format function
        function formatTime(hour) {
            let ampm = hour >= 12 ? "PM" : "AM";
            let h = hour % 12;
            h = h ? h : 12;
            return `${h}:00 ${ampm}`;
        }

        // Map 
        let map = L.map('map').setView([30.3753, 69.3451], 5); // Pakistan default

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let marker;

        // Updatemap 
        function updateMap(lat, lon, city) {
            map.setView([lat, lon], 10);

            if (marker) {
                map.removeLayer(marker);
            }

            marker = L.marker([lat, lon])
                .addTo(map)
                .bindPopup(city)
                .openPopup();
        }

        // Add function for coordinates weather
        async function getWeatherByCoords(lat, lon) {
            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`
            );

            const data = await res.json();
            getWeather(data.name);

            //opening the weather page after clicking on the map

            pages[0].classList.add("active");
            buttons[0].classList.add("active");
            pages[2].classList.remove("active");
            buttons[2].classList.remove("active");
        }

        //Add click on map → get weather
        map.on("click", function (e) {
            const lat = e.latlng.lat;
            const lon = e.latlng.lng;

            getWeatherByCoords(lat, lon);
        });

        // toggle logic for theme
        const toggle = document.getElementById("themeToggle");

        // Load saved theme
        if (localStorage.getItem("theme") === "light") {
            document.body.classList.add("light");
            toggle.checked = true;
        }

        // Toggle event
        toggle.addEventListener("change", () => {
            if (toggle.checked) {
                document.body.classList.add("light");
                localStorage.setItem("theme", "light");
            } else {
                document.body.classList.remove("light");
                localStorage.setItem("theme", "dark");
            }
        });


        // Default
        renderCities();
        getWeather("sialkot");
    </script>

</body>

</html>
